AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment stage
  DomainEventBusName:
    Type: String
    Default: cronos.domain_events
    Description: EventBridge event bus for domain events

Resources:
  CreateGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Stage}-lottery-create-game"
      CodeUri: functions/create-game/
      Handler: bootstrap
      Runtime: provided.al2023
      Environment:
        Variables:
          MONGODB_SECRET_NAME: !Sub "/keno4min/${Stage}/mongodb"
          STAGE: !Ref Stage
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/keno4min/${Stage}/mongodb-*"
    Metadata:
      BuildMethod: makefile

  DrawBallsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Stage}-lottery-draw-balls"
      CodeUri: functions/draw-balls/
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          MONGODB_SECRET_NAME: !Sub "/keno4min/${Stage}/mongodb"
          STAGE: !Ref Stage
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/keno4min/${Stage}/mongodb-*"
    Metadata:
      BuildMethod: makefile

  UpdateTicketsKeno4minFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Stage}-lottery-update-tickets-keno4min"
      CodeUri: functions/update-tickets-keno4min/
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          MONGODB_SECRET_NAME: !Sub "/keno4min/${Stage}/mongodb"
          STAGE: !Ref Stage
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/keno4min/${Stage}/mongodb-*"
    Metadata:
      BuildMethod: makefile

  # Resuelve los tickets en la base del microservicio core (misma cluster, otra
  # DB). Corre en paralelo con UpdateTicketsKeno4min tras el sorteo.
  UpdateTicketsCoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Stage}-lottery-update-tickets-core"
      CodeUri: functions/update-tickets-core/
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          MONGODB_SECRET_NAME: !Sub "/keno4min/${Stage}/mongodb"
          STAGE: !Ref Stage
          CORE_DATABASE_NAME: core
          CORE_TICKETS_COLLECTION: tickets
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/keno4min/${Stage}/mongodb-*"
    Metadata:
      BuildMethod: makefile

  ProcessJackpotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Stage}-lottery-process-jackpot"
      CodeUri: functions/process-jackpot/
      Handler: bootstrap
      Runtime: provided.al2023
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          MONGODB_SECRET_NAME: !Sub "/keno4min/${Stage}/mongodb"
          STAGE: !Ref Stage
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/keno4min/${Stage}/mongodb-*"
    Metadata:
      BuildMethod: makefile

  GameWorkflowStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Type: STANDARD
      DefinitionUri: statemachine/game-workflow.asl.json
      DefinitionSubstitutions:
        CreateGameFunctionArn: !GetAtt CreateGameFunction.Arn
        DrawBallsFunctionArn: !GetAtt DrawBallsFunction.Arn
        UpdateTicketsKeno4minFunctionArn: !GetAtt UpdateTicketsKeno4minFunction.Arn
        UpdateTicketsCoreFunctionArn: !GetAtt UpdateTicketsCoreFunction.Arn
        ProcessJackpotFunctionArn: !GetAtt ProcessJackpotFunction.Arn
        DomainEventBusName: !Ref DomainEventBusName
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref CreateGameFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref DrawBallsFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref UpdateTicketsKeno4minFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref UpdateTicketsCoreFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ProcessJackpotFunction
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref DomainEventBusName

  GameScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Stage}-lottery-game-schedule"
      Description: Trigger new lottery game every 3 minutes
      ScheduleExpression: "rate(3 minutes)"
      State: ENABLED
      Targets:
        - Id: GameWorkflowTarget
          Arn: !GetAtt GameWorkflowStateMachine.Arn
          RoleArn: !GetAtt EventBridgeToStepFunctionsRole.Arn

  EventBridgeToStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartStateMachine
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !GetAtt GameWorkflowStateMachine.Arn
